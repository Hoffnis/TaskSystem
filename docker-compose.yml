
services:

  postgres:
    image: postgres:16
    container_name: postgres-task
    restart: always

    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .

    container_name: task-api

    depends_on:
      - postgres

    ports:
      - "8080:8080"

    environment:
      DB_URL: jdbc:postgresql://postgres:5432/task_management
      DB_USERNAME: postgres
      DB_PASSWORD: admin

      SPRING_PROFILES_ACTIVE: prod

volumes:
  postgres_data: